name: php xdebug artifacts

on:
  workflow_dispatch:
    inputs:
      php_versions:
        description: Space-separated exact PHP versions to build
        required: true
        default: "8.2.30 8.3.30 8.4.20 8.5.5"
      release_tag:
        description: GitHub release tag that stores PHP Xdebug artifacts
        required: true
        default: php-xdebug

permissions:
  contents: write

jobs:
  xdebug:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Check Docker
        run: docker version

      - name: Build Xdebug artifacts
        run: ./scripts/build-php-xdebug-artifacts.sh ${{ inputs.php_versions }}

      - name: Upload Xdebug artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || \
            gh release create "$RELEASE_TAG" \
              --title "PHP Xdebug artifacts" \
              --notes "Routa-managed Xdebug shared extensions for static-php-cli gnu-bulk PHP builds."
          gh release upload "$RELEASE_TAG" dist/routa_php_xdebug_*_linux_${{ matrix.arch }}.tar.gz --clobber
          gh release upload "$RELEASE_TAG" dist/routa_php_xdebug_linux_${{ matrix.arch }}_checksums.txt --clobber
